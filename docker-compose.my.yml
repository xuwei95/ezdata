services:
  # 前端服务
  ezdata-frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: ezdata-frontend:latest
    container_name: ezdata-frontend
    ports:
      - "12580:80"
    volumes:
      - ./web/bin/nginx.dockermy.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - ezdata-backend-my
    networks:
      - ezdata-network

  # 后端服务（MySQL版本）
  ezdata-backend-my:
    build:
      context: ./api
      dockerfile: Dockerfile.my
    image: ezdata-backend-my:latest
    container_name: ezdata-backend-my
    ports:
      - "19099:9099"
    depends_on:
      ezdata-mysql:
        condition: service_healthy
      ezdata-redis:
        condition: service_healthy
      ezdata-es:
        condition: service_started
      ezdata-minio:
        condition: service_started
    networks:
      - ezdata-network
      - ezdata-sandbox-net                # 调用 internal 网里的调试沙箱

  # Celery Worker（任务执行层，复用后端镜像）
  ezdata-worker-my:
    build:
      context: ./api
      dockerfile: Dockerfile.my
    image: ezdata-backend-my:latest
    container_name: ezdata-worker-my
    command: python -m celery -A config.celery_app worker -Q default --autoscale=4,1 --loglevel=INFO
    depends_on:
      ezdata-mysql:
        condition: service_healthy
      ezdata-redis:
        condition: service_healthy
      ezdata-es:
        condition: service_started
      ezdata-minio:
        condition: service_started
    networks:
      - ezdata-network
      - ezdata-sandbox-net                # 调用 internal 网里的调试沙箱

  # ---------------- 代码执行沙箱（调试层:无状态远程执行器） ----------------
  # 复用后端镜像（代码已烤进镜像）。平台「运行代码」的调试态在此执行,正式态仍 worker 直跑。
  #   - env 仅 SANDBOX_*,不内置任何 DB/JWT/数据源凭据;执行所需的一切随每次请求注入,用完即弃
  #   - 仅接 internal 网(无直连公网,出网经 egress-proxy);非 root + drop 所有 caps + 超时/内存上限
  ezdata-sandbox:
    build:
      context: ./api
      dockerfile: Dockerfile.my
    image: ezdata-backend-my:latest
    container_name: ezdata-sandbox
    working_dir: /app
    command: uvicorn sandbox_app:app --host 0.0.0.0 --port 8003
    environment:
      - SANDBOX_PORT=8003
      - SANDBOX_BEARER_KEY=ezdata-sandbox-prod-key   # 与 backend/worker(.env.dockermy)一致
      - PYTHONDONTWRITEBYTECODE=1
      # 禁用 RLIMIT_AS(限的是虚拟地址空间,pandas/numpy 的 .so mmap 远超 RSS);真实内存由 mem_limit 兜底
      - SANDBOX_MEM_LIMIT_BYTES=0
      # 出网只能经 egress 代理(域名白名单);内部服务走 NO_PROXY 直连内网
      - HTTP_PROXY=http://ezdata-egress-proxy:8888
      - HTTPS_PROXY=http://ezdata-egress-proxy:8888
      - http_proxy=http://ezdata-egress-proxy:8888
      - https_proxy=http://ezdata-egress-proxy:8888
      - NO_PROXY=localhost,127.0.0.1,ezdata-mysql,ezdata-es,ezdata-minio,ezdata-redis,ezdata-backend-my,ezdata-worker-my
      - no_proxy=localhost,127.0.0.1,ezdata-mysql,ezdata-es,ezdata-minio,ezdata-redis,ezdata-backend-my,ezdata-worker-my
    networks:
      - ezdata-sandbox-net                # 仅 internal 网:无直连公网,出网经 egress-proxy;内部服务亦在此网可达
    tmpfs:
      - /tmp                              # 临时可写(dlt pipeline 等)
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 2g

  # ---------------- 沙箱出网代理（egress 白名单） ----------------
  # 沙箱在 internal 网无直连公网,出网只能经此。tinyproxy 按 SANDBOX_EGRESS_ALLOW 做域名白名单:
  #   *=全放行;逗号域名列表=仅放行这些域名(含子域)。双网卡:internal 面向沙箱,ezdata-network 借 NAT 出公网。
  ezdata-egress-proxy:
    build:
      context: ./deploy/egress-proxy
    image: ezdata-egress-proxy:latest
    container_name: ezdata-egress-proxy
    environment:
      - SANDBOX_EGRESS_ALLOW=eastmoney.com,sinajs.cn,sina.com.cn,sse.com.cn,szse.cn,cninfo.com.cn,csindex.com.cn,hexun.com,jrj.com.cn,10jqka.com.cn,jin10.com,okx.com,gateio.ws,gate.io,kraken.com,kucoin.com
    networks:
      - ezdata-sandbox-net                # 面向沙箱(internal)
      - ezdata-network                    # 借 NAT 出公网

  # MySQL服务
  ezdata-mysql:
    image: mysql:8.0
    container_name: ezdata-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ezdata123456
      MYSQL_DATABASE: ezdata
    ports:
      - "13306:3306"
    volumes:
      - ./api/sql/ezdata.sql:/docker-entrypoint-initdb.d/ezdata.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci --skip-character-set-client-handshake=1
    networks:
      - ezdata-network
      - ezdata-sandbox-net                # 沙箱经内网取内部数据源
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pezdata123456"]
      interval: 5s
      timeout: 10s
      retries: 30

  # Redis服务
  ezdata-redis:
    image: redis:latest
    container_name: ezdata-redis
    command: redis-server --requirepass ezdata123456
    ports:
      - "16379:6379"
    networks:
      - ezdata-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "ezdata123456", "ping"]
      interval: 5s
      timeout: 10s
      retries: 30

  # Elasticsearch 8（任务日志 + 知识库向量库 + 数据服务,一套三用）
  ezdata-es:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: ezdata-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true               # 开启 basic auth(用户 elastic)
      - xpack.security.http.ssl.enabled=false     # 保持明文 HTTP,只加账号密码(免证书);内网部署用
      - ELASTIC_PASSWORD=ezdata123456             # 仅在数据目录为空(首次初始化)时生效
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - ezdata-es-data:/usr/share/elasticsearch/data
    networks:
      - ezdata-network
      - ezdata-sandbox-net                # 沙箱经内网写任务日志 / 读 ES 数据源

  # MinIO（S3 兼容对象存储，STORAGE_TYPE=s3）
  ezdata-minio:
    image: minio/minio
    container_name: ezdata-minio
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: ezdata123456
    command: server /data --console-address ":19001"
    ports:
      - "9000:9000"
      - "19001:19001"
    volumes:
      - ezdata-minio-data:/data
    networks:
      - ezdata-network
      - ezdata-sandbox-net                # 沙箱经内网读写对象存储数据源

  # 一次性创建 bucket（MinIO 不会自动建桶；建好后退出）
  ezdata-minio-init:
    image: minio/mc
    depends_on:
      - ezdata-minio
    entrypoint: >
      /bin/sh -c "until mc alias set m http://ezdata-minio:9000 minio ezdata123456; do echo waiting-for-minio; sleep 2; done;
                  mc mb -p m/ezdata;
                  mc anonymous set download m/ezdata;
                  exit 0"
    networks:
      - ezdata-network

# 网络配置
networks:
  ezdata-network:
    name: ezdata-network
    driver: bridge
  ezdata-sandbox-net:                      # 沙箱专用内网:internal=true 无 NAT/公网,出网只能经 egress-proxy
    name: ezdata-sandbox-net
    driver: bridge
    internal: true

# 数据卷
volumes:
  ezdata-es-data:
  ezdata-minio-data:
