name: Ruff Check

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run linting
        run: |
          ruff check api
          ruff check tests

      - name: Run format check
        run: |
          ruff format api --check
          ruff format tests --check
