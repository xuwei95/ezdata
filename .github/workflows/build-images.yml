name: Build & Push Images

# 触发逻辑:
#   - 打 tag(如 v2.0.1)→ 打并推「版本号(去 v,= 2.0.1)」+ latest
#   - 手动触发(Actions 页 workflow_dispatch,按所选分支/ref)→ 打并推 latest
#   - 合并/推送到 master:不再自动构建 / 不再打 latest(发布改由「打 tag」或「手动触发」)
# 需要在仓库 Settings → Secrets and variables → Actions 配置:
#   DOCKERHUB_USERNAME / DOCKERHUB_TOKEN(Docker Hub 账号与 access token)
on:
  push:
    tags: ['v*']     # 只在 v 开头的版本 tag 触发(如 v2.0.1)
  workflow_dispatch: {}   # 手动触发:按所选分支/ref 构建并推 latest

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ezdata123/ezdata          # 后端(MySQL 版)
            context: ./api
            dockerfile: ./api/Dockerfile.my
          - image: ezdata123/ezdata_web       # 前端
            context: ./web
            dockerfile: ./web/Dockerfile
    steps:
      - uses: actions/checkout@v5

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          # flavor latest=false:不让 metadata-action 自动加 latest,latest 完全由下面 raw 规则控制。
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
          # 说明:
          #   - 打 tag v2.0.1 → semver 出镜像 tag = 2.0.1(去 v 前缀),raw 再叠一个 latest;
          #   - 手动触发(workflow_dispatch,非 tag)→ semver 不产出,只由 raw 打 latest;
          #   semver 只认规范版本 tag(v1.2.3),故上面触发也限定 tags: ['v*']。

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
