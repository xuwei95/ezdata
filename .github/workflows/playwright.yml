          # Check that backend is actually responding on the API endpoint(整栈 build+启动较重,给足窗口)
          echo "Checking if backend service is ready..."
          for i in {1..60}; do
            if curl -f http://localhost:9099/captchaImage > /dev/null 2>&1; then
