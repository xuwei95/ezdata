# ============================================================================
# ezdata 生产部署（MySQL / PostgreSQL 二合一）
# ----------------------------------------------------------------------------
#   默认 MySQL,零配置:        docker compose up -d
#   切 PostgreSQL(一个 flag): docker compose --env-file .env.pg up -d
#
# 所有可调项见 .env.example;不建 .env 时一律用下面 :- 后的默认值(=MySQL)。
# 这是 compose 层插值,只影响镜像/端口/容器名/environment;
# 后端/worker 的业务配置(DB/JWT/AI 等)仍来自镜像内 api/.env.<APP_ENV>。
# ============================================================================
services:
  # 前端服务
  ezdata-frontend:
    image: ${FRONTEND_IMAGE:-ezdata123/ezdata_web:2.0.0}
    container_name: ezdata-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      # MySQL→nginx.dockermy.conf(代理 ezdata-backend-my);PG→nginx.dockerpg.conf(代理 ezdata-backend-pg)
      - ./web/bin/${NGINX_CONF:-nginx.dockermy.conf}:/etc/nginx/conf.d/default.conf
    depends_on:
      - ezdata-backend
    networks:
      - ezdata-network

  # 后端服务
  ezdata-backend:
    image: ${EZDATA_IMAGE:-ezdata123/ezdata:2.0.0}
    container_name: ${BACKEND_NAME:-ezdata-backend-my}   # 须与 NGINX_CONF 里的 proxy_pass 目标一致
    # 同目录 .env 注入应用配置:存在则其值覆盖镜像内 .env.dockermy(compose env 优先级 > load_dotenv);
    # 不存在则跳过(required:false),走镜像内默认 → 零配置仍可启动。
    env_file:
      - path: ./.env
        required: false
    environment:
      - APP_ENV=${APP_ENV:-dockermy}      # 后端镜像 CMD 已带 --env,此处仅为可覆盖性显式列出
      - TZ=${TZ:-Asia/Shanghai}           # 容器时区=北京时间:调度/日志/时间戳统一(不设则 UTC,定时会错 8 小时)
    ports:
      - "${BACKEND_PORT:-19099}:9099"
    depends_on:
      ezdata-db:
        condition: service_healthy
      ezdata-redis:
        condition: service_healthy
      ezdata-es:
        condition: service_started
      ezdata-minio:
        condition: service_started
    networks:
      - ezdata-network
      - ezdata-sandbox-net                # 调用 internal 网里的调试沙箱
    restart: unless-stopped               # 自愈:DB 首次 initdb 期 TCP 暂拒(healthcheck 走 socket 已绿)会让首连失败

  # Celery Worker（任务执行层，复用后端镜像）
  ezdata-worker:
    image: ${EZDATA_IMAGE:-ezdata123/ezdata:2.0.0}
    container_name: ${WORKER_NAME:-ezdata-worker-my}
    # 固定并发:设了 WORKER_CONCURRENCY(见 .env)用其值,不设则省略 --concurrency → celery 默认=CPU 核数
    command: sh -c 'exec python -m celery -A config.celery_app worker -Q default$${WORKER_CONCURRENCY:+ --concurrency=$$WORKER_CONCURRENCY} --loglevel=INFO'
    env_file:
      - path: ./.env                      # 同 backend:同目录 .env 覆盖应用配置,缺省可选
        required: false
    environment:
      - APP_ENV=${APP_ENV:-dockermy}      # celery 不经 --env,须显式指定配置环境(否则回退 .env.dev → 连 127.0.0.1)
      - TZ=${TZ:-Asia/Shanghai}
    depends_on:
      ezdata-db:
        condition: service_healthy
      ezdata-redis:
        condition: service_healthy
      ezdata-es:
        condition: service_started
      ezdata-minio:
        condition: service_started
    networks:
      - ezdata-network
      - ezdata-sandbox-net                # 调用 internal 网里的调试沙箱
    restart: unless-stopped               # 自愈:DB 首次 initdb 期 TCP 暂拒(healthcheck 走 socket 已绿)会让首连失败

  # ---------------- 代码执行沙箱（调试层:无状态远程执行器） ----------------
  # 复用后端镜像（代码已烤进镜像）。平台「运行代码」的调试态在此执行,正式态仍 worker 直跑。
  #   - env 仅 SANDBOX_*,不内置任何 DB/JWT/数据源凭据;执行所需的一切随每次请求注入,用完即弃
  #   - 仅接 internal 网(无直连公网,出网经 egress-proxy);非 root + drop 所有 caps + 超时/内存上限
  ezdata-sandbox:
    image: ${EZDATA_IMAGE:-ezdata123/ezdata:2.0.0}
    container_name: ezdata-sandbox
    working_dir: /app
    command: uvicorn sandbox_app:app --host 0.0.0.0 --port 8003
    environment:
      - SANDBOX_PORT=8003
      - SANDBOX_BEARER_KEY=${SANDBOX_BEARER_KEY:-ezdata-sandbox-prod-key}   # 与 backend/worker(api/.env.<APP_ENV>)一致
      - PYTHONDONTWRITEBYTECODE=1
      # 禁用 RLIMIT_AS(限的是虚拟地址空间,pandas/numpy 的 .so mmap 远超 RSS);真实内存由 mem_limit 兜底
      - SANDBOX_MEM_LIMIT_BYTES=0
      # 出网只能经 egress 代理(域名白名单);内部服务走 NO_PROXY 直连内网
      - HTTP_PROXY=http://ezdata-egress-proxy:8888
      - HTTPS_PROXY=http://ezdata-egress-proxy:8888
      - http_proxy=http://ezdata-egress-proxy:8888
      - https_proxy=http://ezdata-egress-proxy:8888
      - NO_PROXY=localhost,127.0.0.1,${DB_HOST:-ezdata-mysql},ezdata-es,ezdata-minio,ezdata-redis,${BACKEND_NAME:-ezdata-backend-my},${WORKER_NAME:-ezdata-worker-my}
      - no_proxy=localhost,127.0.0.1,${DB_HOST:-ezdata-mysql},ezdata-es,ezdata-minio,ezdata-redis,${BACKEND_NAME:-ezdata-backend-my},${WORKER_NAME:-ezdata-worker-my}
    networks:
      - ezdata-sandbox-net                # 仅 internal 网:无直连公网,出网经 egress-proxy;内部服务亦在此网可达
    tmpfs:
      - /tmp                              # 临时可写(dlt pipeline 等)
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 2g

  # ---------------- 沙箱出网代理（egress 白名单） ----------------
  # 沙箱在 internal 网无直连公网,出网只能经此。tinyproxy 按 SANDBOX_EGRESS_ALLOW 做域名白名单:
  #   *=全放行;逗号域名列表=仅放行这些域名(含子域)。双网卡:internal 面向沙箱,ezdata-network 借 NAT 出公网。
  ezdata-egress-proxy:
    build:
      context: ./deploy/egress-proxy
    image: ezdata-egress-proxy:latest
    container_name: ezdata-egress-proxy
    environment:
      - SANDBOX_EGRESS_ALLOW=${SANDBOX_EGRESS_ALLOW:-eastmoney.com,sinajs.cn,sina.com.cn,sse.com.cn,szse.cn,cninfo.com.cn,csindex.com.cn,hexun.com,jrj.com.cn,10jqka.com.cn,jin10.com,okx.com,gateio.ws,gate.io,kraken.com,kucoin.com}
    networks:
      - ezdata-sandbox-net                # 面向沙箱(internal)
      - ezdata-network                    # 借 NAT 出公网

  # ---------------- 数据库（MySQL 默认 / PostgreSQL 经 .env.pg 切换） ----------------
  # 单服务全参数化:默认值=MySQL;.env.pg 一次性翻 DB_* 与镜像/容器名等。
  #   - MYSQL_* 与 POSTGRES_* 两套 env 同时给:对方镜像会忽略不认的键,无副作用
  #   - container_name=DB_HOST,须与镜像内 api/.env.<APP_ENV> 的 DB_HOST 一致(应用据此连库)
  #   - command/healthcheck/初始化 SQL 各 DB 不同,全走变量
  ezdata-db:
    image: ${DB_IMAGE:-mysql:8.0}
    container_name: ${DB_HOST:-ezdata-mysql}
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-ezdata123456}
      MYSQL_DATABASE: ${DB_DATABASE:-ezdata}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ezdata123456}
      POSTGRES_DB: ${DB_DATABASE:-ezdata}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS:---encoding=UTF8 --lc-collate=C --lc-ctype=C}
    ports:
      # 宿主侧端口用 *_HOST_PORT(与应用连接端口 DB_PORT=3306 区分,避免单一 .env 注入冲突)
      - "${DB_HOST_PORT:-13306}:${DB_INTERNAL_PORT:-3306}"
    volumes:
      # 任意 *.sql 都会在首次 initdb(数据目录为空)时执行;MySQL→ezdata.sql,PG→ezdata-pg.sql
      - ${DB_INIT_SQL:-./api/sql/ezdata.sql}:/docker-entrypoint-initdb.d/init.sql
      # 数据持久化:MySQL→/var/lib/mysql,PG→/var/lib/postgresql/data(.env.pg 覆盖 DB_DATA_DIR)
      - ${DB_DATA_VOLUME:-ezdata-db-data}:${DB_DATA_DIR:-/var/lib/mysql}
    command: ${DB_COMMAND:---character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci --skip-character-set-client-handshake=1}
    networks:
      - ezdata-network
      - ezdata-sandbox-net                # 沙箱经内网取内部数据源
    healthcheck:
      # 字符串形式 = CMD-SHELL;$$ 转义为容器内的 $,由容器 shell 展开自身 env(自动跟随 DB_PASSWORD)
      test: ${DB_HEALTHCHECK:-mysqladmin ping -h localhost -u root -p"$$MYSQL_ROOT_PASSWORD"}
      interval: 5s
      timeout: 10s
      retries: 30

  # ---------------- 数据库定时备份(sidecar,默认关闭) ----------------
  # 复用 DB 镜像,循环跑 deploy/backup/backup.sh(mysqldump/pg_dump → gzip,保留最近 N 份)。
  #   - 间隔 BACKUP_INTERVAL_SECONDS(默认 24h),保留份数 BACKUP_KEEP(默认 7)
  #   - 备份落命名卷 ezdata-db-backup-data:/backups;脚本以只读挂载,改脚本即生效
  #   - PG 经 .env.pg 把 DB_KIND/DB_IMAGE/DB_USER 切过去
  # 默认不启用;需要定时备份时取消下方整段注释 + 取消 volumes 段的 ezdata-db-backup-data。
  # (临时手动备份可直接:docker run --rm --network ezdata-network -v ...:/backups -v ./deploy/backup:/scripts mysql:8.0 sh /scripts/backup.sh)
  # ezdata-db-backup:
  #   image: ${DB_IMAGE:-mysql:8.0}
  #   container_name: ezdata-db-backup
  #   depends_on:
  #     ezdata-db:
  #       condition: service_healthy
  #   environment:
  #     - DB_KIND=${DB_KIND:-mysql}
  #     - DB_HOST=${DB_HOST:-ezdata-mysql}
  #     - DB_USER=${DB_USER:-root}
  #     - DB_PASSWORD=${DB_PASSWORD:-ezdata123456}
  #     - DB_NAME=${DB_NAME:-ezdata}
  #     - BACKUP_DIR=/backups
  #     - BACKUP_KEEP=${BACKUP_KEEP:-7}
  #     - BACKUP_INTERVAL_SECONDS=${BACKUP_INTERVAL_SECONDS:-86400}
  #   entrypoint:
  #     - /bin/sh
  #     - -c
  #     # $$ 转义,由容器 shell 在运行时展开自身 env;失败(如首启 DB 未就绪)则 60s 后重试,成功才按间隔睡
  #     - 'while true; do if sh /scripts/backup.sh; then sleep "$$BACKUP_INTERVAL_SECONDS"; else echo "[backup] retry in 60s"; sleep 60; fi; done'
  #   volumes:
  #     - ./deploy/backup:/scripts:ro
  #     - ezdata-db-backup-data:/backups
  #   networks:
  #     - ezdata-network
  #   restart: unless-stopped

  # Redis服务
  ezdata-redis:
    image: ${REDIS_IMAGE:-redis:latest}
    container_name: ezdata-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-ezdata123456}
    ports:
      - "${REDIS_HOST_PORT:-16379}:6379"
    networks:
      - ezdata-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-ezdata123456}", "ping"]
      interval: 5s
      timeout: 10s
      retries: 30

  # Elasticsearch 8（任务日志 + 知识库向量库 + 数据服务,一套三用）
  ezdata-es:
    image: ${ES_IMAGE:-docker.elastic.co/elasticsearch/elasticsearch:8.13.4}
    container_name: ezdata-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true               # 开启 basic auth(用户 elastic)
      - xpack.security.http.ssl.enabled=false     # 保持明文 HTTP,只加账号密码(免证书);内网部署用
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-ezdata123456}             # 仅在数据目录为空(首次初始化)时生效
      - ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms512m -Xmx512m}
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      - ezdata-es-data:/usr/share/elasticsearch/data
    networks:
      - ezdata-network
      - ezdata-sandbox-net                # 沙箱经内网写任务日志 / 读 ES 数据源

  # MinIO（S3 兼容对象存储，STORAGE_TYPE=s3）
  ezdata-minio:
    image: ${MINIO_IMAGE:-minio/minio}
    container_name: ezdata-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ezdata123456}
    command: server /data --console-address ":19001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-19001}:19001"
    volumes:
      - ezdata-minio-data:/data
    networks:
      - ezdata-network
      - ezdata-sandbox-net                # 沙箱经内网读写对象存储数据源

  # 一次性创建 bucket（MinIO 不会自动建桶；建好后退出）
  ezdata-minio-init:
    image: ${MINIO_MC_IMAGE:-minio/mc}
    depends_on:
      - ezdata-minio
    entrypoint: >
      /bin/sh -c "until mc alias set m http://ezdata-minio:9000 ${MINIO_ROOT_USER:-minio} ${MINIO_ROOT_PASSWORD:-ezdata123456}; do echo waiting-for-minio; sleep 2; done;
                  mc mb -p m/ezdata;
                  mc anonymous set download m/ezdata;
                  exit 0"
    networks:
      - ezdata-network

# 网络配置
networks:
  ezdata-network:
    name: ezdata-network
    driver: bridge
  ezdata-sandbox-net:                      # 沙箱专用内网:internal=true 无 NAT/公网,出网只能经 egress-proxy
    name: ezdata-sandbox-net
    driver: bridge
    internal: true

# 数据卷
volumes:
  ezdata-db-data:                          # DB 数据持久化(容器重建不丢数据)
  # ezdata-db-backup-data:                 # DB 定时备份产物(随 ezdata-db-backup 一起启用)
  ezdata-es-data:
  ezdata-minio-data:
