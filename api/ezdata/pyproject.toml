# ezdata 依赖管理(PEP 621)。
#   core  = 基础库(sqlalchemy/dlt/pandas),import ezdata 即可用其数据访问骨架;
#   extras= 各数据源驱动,按需装:pip install "ezdata[mysql,elasticsearch]";
#           也可运行时动态装:ezdata.services.install_dependencies("mysql")。
# 各源依赖来源为对应 handler 目录的 requirements.txt(此处汇总,保持一致)。

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "ezdata"
version = "0.1.0"
description = "多源数据访问 SDK:统一连接器 + 门面 + 提示词 + 依赖管理(懒加载,按需装驱动)"
requires-python = ">=3.10"
dependencies = ["SQLAlchemy[asyncio]>=2.0", "dlt>=0.5", "pandas>=2.0"]

[project.optional-dependencies]
akshare = ["akshare>=1.18.0"]
arrow = ["pyarrow>=14"]
athena = ["pyathena[sqlalchemy]>=3.0.0"]
aurora = ["PyMySQL>=1.1.0"]
azure_blob = ["adlfs", "duckdb>=0.10.0"]
bigquery = ["google-cloud-bigquery[pandas]", "sqlalchemy-bigquery", "google-auth", "google-auth-oauthlib"]
cassandra = ["scylla-driver"]
ccxt = ["ccxt>=4.4"]
chromadb = ["agno[chromadb]"]
clickhouse = ["clickhouse-sqlalchemy>=0.3.1"]
cloud_spanner = ["google-cloud-spanner", "sqlalchemy-spanner"]
cloud_sql = ["PyMySQL>=1.1.0", "pymssql>=2.2.0"]
couchbase = ["couchbase==4.3.1"]
crate = ["crate", "sqlalchemy-cratedb"]
databend = ["databend-sqlalchemy"]
databricks = ["databricks-sql-connector >= 3.7.1, < 4.0.0"]
db2 = ["ibm-db-sa", "ibm-db"]
documentdb = ["pymongo>=4.0.0"]
dolt = ["pymysql"]
doris = ["PyMySQL>=1.1.0"]
dremio = ["sqlalchemy_dremio"]
druid = ["pydruid"]
duckdb = ["duckdb-engine>=0.13.0"]
dynamodb = ["boto3>=1.28.0"]
edgelessdb = ["PyMySQL>=1.1.0"]
elasticsearch = ["elasticsearch>=8.13,<9"]
firebird = ["fdb", "sqlalchemy-firebird >= 2.0.0, <3.0.0"]
gcs = ["fsspec", "gcsfs", "google-auth", "google-cloud-storage", "duckdb>=0.10.0"]
greptimedb = ["PyMySQL>=1.1.0"]
hana = ["sqlalchemy-hana", "hdbcli"]
hive = ["thrift", "thrift-sasl", "pyhive"]
impala = ["impyla"]
influxdb = ["influxdb3-python"]
informix = ["sqlalchemy-informix"]
ingres = ["pyodbc", "sqlalchemy-ingres[all]"]
kafka = ["kafka-python>=2.0.0"]
lancedb = ["agno[lancedb]"]
mariadb = ["PyMySQL>=1.1.0"]
materialize = ["psycopg2-binary"]
matrixone = ["pymysql"]
milvus = ["agno[milvusdb]"]
monetdb = ["pymonetdb", "sqlalchemy-monetdb"]
mongodb = ["pymongo>=4.0.0"]
mssql = ["pymssql>=2.2.0"]
mysql = ["PyMySQL>=1.1.0"]
mysql_binlog = ["mysql-replication>=1.0.0"]
neo4j = ["neo4j>=5.0.0"]
oceanbase = ["PyMySQL>=1.1.0"]
opensearch = ["opensearch-py>=2.0.0"]
oracle = ["oracledb>=2.0.0"]
pgvector = ["agno[pgvector]", "psycopg2-binary"]
pinecone = ["agno[pinecone]"]
pinot = ["pinotdb"]
planetscale = ["PyMySQL>=1.1.0"]
postgresql = ["psycopg2-binary"]
qdrant = ["agno[qdrant]"]
questdb = ["questdb"]
redis = ["redis>=5.0.0"]
redshift = ["psycopg2-binary"]
rockset = ["PyMySQL>=1.1.0"]
s3 = ["boto3>=1.28.0", "duckdb>=0.10.0"]
scylla = ["scylla-driver"]
singlestore = ["PyMySQL>=1.1.0"]
snowflake = ["snowflake-connector-python[pandas]==3.15.0", "snowflake-sqlalchemy==1.7.0"]
sqlany = ["sqlalchemy-sqlany", "sqlanydb"]
sqreamdb = ["pysqream>=3.2.5", "pysqream_sqlalchemy>=0.8"]
starrocks = ["PyMySQL>=1.1.0"]
supabase = ["psycopg2-binary"]
tdengine = ["taospy[rest]"]
teradata = ["teradatasql", "teradatasqlalchemy"]
tidb = ["PyMySQL>=1.1.0"]
trino = ["trino~=0.313.0", "pyhive"]
vertica = ["vertica-python", "sqlalchemy-vertica-python"]
vitess = ["PyMySQL>=1.1.0"]
weaviate = ["agno[weaviate]"]
yugabyte = ["psycopg2-binary"]
all = ["akshare>=1.18.0", "pyathena[sqlalchemy]>=3.0.0", "PyMySQL>=1.1.0", "adlfs", "duckdb>=0.10.0", "google-cloud-bigquery[pandas]", "sqlalchemy-bigquery", "google-auth", "google-auth-oauthlib", "scylla-driver", "ccxt>=4.4", "agno[chromadb]", "clickhouse-sqlalchemy>=0.3.1", "google-cloud-spanner", "sqlalchemy-spanner", "pymssql>=2.2.0", "couchbase==4.3.1", "crate", "sqlalchemy-cratedb", "databend-sqlalchemy", "databricks-sql-connector >= 3.7.1, < 4.0.0", "ibm-db-sa", "ibm-db", "pymongo>=4.0.0", "pymysql", "sqlalchemy_dremio", "pydruid", "duckdb-engine>=0.13.0", "boto3>=1.28.0", "elasticsearch>=8.13,<9", "fdb", "sqlalchemy-firebird >= 2.0.0, <3.0.0", "fsspec", "gcsfs", "google-cloud-storage", "sqlalchemy-hana", "hdbcli", "thrift", "thrift-sasl", "pyhive", "impyla", "influxdb3-python", "sqlalchemy-informix", "pyodbc", "sqlalchemy-ingres[all]", "kafka-python>=2.0.0", "agno[lancedb]", "psycopg2-binary", "agno[milvusdb]", "pymonetdb", "sqlalchemy-monetdb", "mysql-replication>=1.0.0", "neo4j>=5.0.0", "opensearch-py>=2.0.0", "oracledb>=2.0.0", "agno[pgvector]", "agno[pinecone]", "pinotdb", "agno[qdrant]", "questdb", "redis>=5.0.0", "snowflake-connector-python[pandas]==3.15.0", "snowflake-sqlalchemy==1.7.0", "sqlalchemy-sqlany", "sqlanydb", "pysqream>=3.2.5", "pysqream_sqlalchemy>=0.8", "taospy[rest]", "teradatasql", "teradatasqlalchemy", "trino~=0.313.0", "vertica-python", "sqlalchemy-vertica-python", "agno[weaviate]", "pyarrow>=14"]

# pyproject 位于 ezdata/ 内:从父目录发现,才能把本目录识别为顶层包 `ezdata`(而非 handlers/services)
[tool.setuptools.packages.find]
where = [".."]
include = ["ezdata*"]

# 打包非 .py 资源:图标/说明/各源 requirements(handler_icon 与依赖诊断运行时要读)
[tool.setuptools.package-data]
"*" = ["*.svg", "*.md", "*.txt", "*.png"]
