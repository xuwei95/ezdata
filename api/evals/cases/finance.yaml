# 财经 demo 回归用例(对 demo_es 的确定性数据)。
# fixtures 按 <id>.run<k>.jsonl 自动发现;live 模式实跑后自动录制到 fixtures/。

- id: div_bond10y_trend
  question: 画一下十年期国债收益率的历史走势折线图
  model_id: 0
  runs: 3
  tags: [取数, 出图]
  known_tables: [div_bond10y, div_index_h30269, div_valuation]
  checks:
    - tool_ran_ok
    - {type: used_datasource, code: demo_es}
    - {type: result_nonempty, min_rows: 20}
    - {type: chart, chart_type: line, min_rows: 20}
    - no_hallucinated_table

