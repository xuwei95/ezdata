# ============================================================================
# 开发调试 compose（自包含，单文件即可运行）
#
# 前后端均“镜像内装好依赖 + 挂载本地源码 + 以 dev 模式热更新”运行：
#   - 后端：Dockerfile.my 装好 Python 依赖，挂载源码，uvicorn --reload 热重载
#   - 前端：Dockerfile.dev 装好 node_modules，挂载源码，Vite dev server（HMR 热更新）
#   - 附带 MySQL、Redis，首次自动用 sql 脚本初始化库
#
# 用法：
#   docker compose -f docker-compose.dev.yml up --build      # 首次/依赖变更
#   docker compose -f docker-compose.dev.yml up               # 日常调试
#   docker compose -f docker-compose.dev.yml down             # 停止
#
# 访问：
#   前端（带 /dev-api 代理到后端）  http://localhost:12580
#   后端 Swagger 文档               http://localhost:9099/docs
#
# 依赖变更时才需重建：
#   后端改 requirements.txt → 重新 --build；前端改 package.json → 重新 --build
# ============================================================================
services:
  # ---------------- 后端（dev 热重载） ----------------
  ruoyi-backend-dev:
    build:
      context: ./ruoyi-fastapi-backend
      dockerfile: Dockerfile.dev         # 开发镜像（阿里云源装 Python 依赖；清华源缺部分包）
    image: ruoyi-backend-dev:latest
    container_name: ruoyi-backend-dev
    working_dir: /app
    # 直接用 uvicorn 以工厂模式 + 热重载启动（不经 ruoyi CLI，uvicorn 必定可用）
    command: >
      python -m uvicorn server:create_app
      --host 0.0.0.0
      --port 9099
      --factory
      --reload
      --reload-dir /app
    volumes:
      - ./ruoyi-fastapi-backend:/app      # 挂载后端源码：改 .py 即时热重载
      - /app/__pycache__                  # 遮蔽宿主可能带入的 pyc 缓存
    environment:
      - APP_ENV=dev                       # 以 dev 配置运行（.env.dev：APP_RELOAD=true、Swagger 开启）
      # 覆盖 .env.dev 中指向 127.0.0.1 的连接，改为 compose 服务名（load_dotenv 不覆盖已存在的环境变量）
      - DB_HOST=ruoyi-mysql-dev
      - DB_PORT=3306
      - DB_PASSWORD=root
      - REDIS_HOST=ruoyi-redis-dev
      - REDIS_PORT=6379
      # Windows 主机 bind mount 文件事件传不进容器，强制轮询以保证 --reload 生效
      - WATCHFILES_FORCE_POLLING=true
    ports:
      - "9099:9099"                       # 直连后端（Swagger / 调试）
    depends_on:
      ruoyi-mysql-dev:
        condition: service_healthy
      ruoyi-redis-dev:
        condition: service_healthy
    networks:
      - ruoyi-dev-network
    stdin_open: true                      # 支持容器内 breakpoint()/pdb 交互
    tty: true
    restart: "no"

  # ---------------- Celery Worker（任务调度执行层） ----------------
  ruoyi-worker-dev:
    build:
      context: ./ruoyi-fastapi-backend
      dockerfile: Dockerfile.dev          # 复用后端镜像（含 celery 依赖）
    image: ruoyi-backend-dev:latest
    container_name: ruoyi-worker-dev
    working_dir: /app
    # prefork 池：容器为 Linux。--autoscale=MAX,MIN 启用弹性并发(同时支持 pool grow/shrink 与运行时 autoscale 控制命令)
    command: >
      python -m celery -A config.celery_app worker
      -Q default
      --autoscale=4,1
      --loglevel=INFO
    volumes:
      - ./ruoyi-fastapi-backend:/app      # 与后端共享源码：改 runner/任务代码即时生效（重启 worker 后）
      - /app/__pycache__
    environment:
      - APP_ENV=dev
      - DB_HOST=ruoyi-mysql-dev
      - DB_PORT=3306
      - DB_PASSWORD=root
      - REDIS_HOST=ruoyi-redis-dev
      - REDIS_PORT=6379
    depends_on:
      ruoyi-mysql-dev:
        condition: service_healthy
      ruoyi-redis-dev:
        condition: service_healthy
    networks:
      - ruoyi-dev-network
    restart: "no"

  # ---------------- 前端（Vite dev server / HMR） ----------------
  ruoyi-frontend-dev:
    build:
      context: ./ruoyi-fastapi-frontend
      dockerfile: Dockerfile.dev          # 仅装 node_modules，跑 vite dev
    image: ruoyi-frontend-dev:latest
    container_name: ruoyi-frontend-dev
    working_dir: /app
    volumes:
      - ./ruoyi-fastapi-frontend:/app     # 挂载前端源码：改 .vue/.js 即时 HMR
      - /app/node_modules                 # 用镜像内的 node_modules，避免被宿主目录遮蔽
    environment:
      # vite.config.js 的代理目标读取此变量，docker 内指向后端服务名（容器互通）
      - VITE_DEV_PROXY_TARGET=http://ruoyi-backend-dev:9099
    ports:
      - "12580:12580"                     # 宿主与容器端口一致，避免 HMR websocket 端口错配
    depends_on:
      - ruoyi-backend-dev
    networks:
      - ruoyi-dev-network
    restart: "no"

  # ---------------- MySQL ----------------
  ruoyi-mysql-dev:
    image: mysql:8.0
    container_name: ruoyi-mysql-dev
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ruoyi-fastapi       # 与 .env.dev 的 DB_DATABASE 一致
    ports:
      - "13306:3306"
    volumes:
      # 首次启动自动导入初始化 sql（库为空时执行）
      - ./ruoyi-fastapi-backend/sql/ruoyi-fastapi.sql:/docker-entrypoint-initdb.d/ruoyi-fastapi.sql
      - ruoyi-mysql-dev-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci --skip-character-set-client-handshake=1
    networks:
      - ruoyi-dev-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 10s
      retries: 30

  # ---------------- Redis ----------------
  ruoyi-redis-dev:
    image: redis:latest
    container_name: ruoyi-redis-dev
    ports:
      - "16379:6379"
    networks:
      - ruoyi-dev-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 10s
      retries: 30

volumes:
  ruoyi-mysql-dev-data:                   # 持久化数据库，重启不丢数据（如需重置：docker compose ... down -v）

networks:
  ruoyi-dev-network:
    name: ruoyi-dev-network
    driver: bridge
