services:
  # 前端服务
  ezdata-frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: ezdata-frontend:latest
    container_name: ezdata-frontend
    ports:
      - "12580:80"
    volumes:
      - ./web/bin/nginx.dockerpg.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - ezdata-backend-pg
    networks:
      - ezdata-network

  # 后端服务（PostgreSQL版本）
  ezdata-backend-pg:
    build:
      context: ./api
      dockerfile: Dockerfile.pg
    image: ezdata-backend-pg:latest
    container_name: ezdata-backend-pg
    ports:
      - "19099:9099"
    depends_on:
      ezdata-pg:
        condition: service_healthy
      ezdata-redis:
        condition: service_healthy
      ezdata-es:
        condition: service_started
      ezdata-minio:
        condition: service_started
    networks:
      - ezdata-network

  # Celery Worker（任务执行层，复用后端镜像）
  ezdata-worker-pg:
    build:
      context: ./api
      dockerfile: Dockerfile.pg
    image: ezdata-backend-pg:latest
    container_name: ezdata-worker-pg
    command: python -m celery -A config.celery_app worker -Q default --autoscale=4,1 --loglevel=INFO
    depends_on:
      ezdata-pg:
        condition: service_healthy
      ezdata-redis:
        condition: service_healthy
      ezdata-es:
        condition: service_started
      ezdata-minio:
        condition: service_started
    networks:
      - ezdata-network

  # PostgreSQL服务
  ezdata-pg:
    image: postgres:14
    container_name: ezdata-pg
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_DB: ezdata
      POSTGRES_INITDB_ARGS: --encoding=UTF8 --lc-collate=C --lc-ctype=C
    ports:
      - "15432:5432"
    volumes:
      - ./api/sql/ezdata-pg.sql:/docker-entrypoint-initdb.d/ezdata-pg.sql
    networks:
      - ezdata-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 10s
      retries: 30

  # Redis服务
  ezdata-redis:
    image: redis:latest
    container_name: ezdata-redis
    ports:
      - "16379:6379"
    networks:
      - ezdata-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 10s
      retries: 30

  # Elasticsearch（任务日志检索后端，TASK_LOG_TYPE=es）
  ezdata-es:
    image: elasticsearch:7.17.13
    container_name: ezdata-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - ezdata-es-data:/usr/share/elasticsearch/data
    networks:
      - ezdata-network

  # MinIO（S3 兼容对象存储，STORAGE_TYPE=s3）
  ezdata-minio:
    image: minio/minio
    container_name: ezdata-minio
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123456
    command: server /data --console-address ":19001"
    ports:
      - "9000:9000"
      - "19001:19001"
    volumes:
      - ezdata-minio-data:/data
    networks:
      - ezdata-network

  # 一次性创建 bucket（MinIO 不会自动建桶；建好后退出）
  ezdata-minio-init:
    image: minio/mc
    depends_on:
      - ezdata-minio
    entrypoint: >
      /bin/sh -c "until mc alias set m http://ezdata-minio:9000 minio minio123456; do echo waiting-for-minio; sleep 2; done;
                  mc mb -p m/ezdata;
                  mc anonymous set download m/ezdata;
                  exit 0"
    networks:
      - ezdata-network

# 网络配置
networks:
  ezdata-network:
    name: ezdata-network
    driver: bridge

# 数据卷
volumes:
  ezdata-es-data:
  ezdata-minio-data: