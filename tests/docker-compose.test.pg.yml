services:
  # 前端服务
  ruoyi-frontend:
    build:
      context: ../web
      dockerfile: Dockerfile
    image: ruoyi-frontend:latest
    container_name: ruoyi-frontend-test
    ports:
      - "80:80"
    volumes:
      - ../web/bin/nginx.dockerpg.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - ruoyi-backend-pg
    networks:
      - ruoyi-network-test

  # 后端服务（PostgreSQL版本）
  ruoyi-backend-pg:
    build:
      context: ../api
      dockerfile: Dockerfile.pg
    image: ruoyi-backend-pg:latest
    container_name: ruoyi-backend-pg-test
    ports:
      - "9099:9099"
    environment:
      TRANSPORT_CRYPTO_ENABLED: "false"
      TRANSPORT_CRYPTO_MODE: "off"
      # 镜像内 .env.dockerpg 默认指向 ezdata-* 生产坐标(测试网里不存在)→ 必须覆盖到测试中间件,
      # 否则后端起来连不上库/缓存,/captchaImage 一直不响应,卡在“Wait for services to be ready”。
      DB_TYPE: postgresql
      DB_HOST: ruoyi-pg
      DB_PORT: "5432"
      DB_USERNAME: postgres
      DB_PASSWORD: root
      DB_DATABASE: ruoyi-fastapi
      DB_ECHO: "false"
      REDIS_HOST: ruoyi-redis
      REDIS_PORT: "6379"
      REDIS_USERNAME: ""
      REDIS_PASSWORD: ""
      REDIS_DATABASE: "0"
      # 测试栈不起 ES / MinIO:任务日志走 DB、存储走本地,避免启动依赖外部服务。
      TASK_LOG_TYPE: db
      STORAGE_TYPE: local
    depends_on:
      ruoyi-pg:
        condition: service_healthy
      ruoyi-redis:
        condition: service_healthy
    networks:
      - ruoyi-network-test

  # PostgreSQL服务
  ruoyi-pg:
    image: postgres:14
    container_name: ruoyi-pg-test
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_DB: ruoyi-fastapi
      POSTGRES_INITDB_ARGS: --encoding=UTF8 --lc-collate=C --lc-ctype=C
    ports:
      - "15433:5432"
    volumes:
      - ../api/sql/ezdata-pg.sql:/docker-entrypoint-initdb.d/01-ezdata-pg.sql
      - ./disable_captcha.sql:/docker-entrypoint-initdb.d/02-disable-captcha.sql
    networks:
      - ruoyi-network-test
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 10s
      retries: 30
      # 首启需 import 整份 ezdata-pg.sql;start_period 内的失败不计数、不标 unhealthy,避免慢导入被误杀。
      start_period: 240s

  # Redis服务
  ruoyi-redis:
    image: redis:latest
    container_name: ruoyi-redis-test
    ports:
      - "16381:6379"
    networks:
      - ruoyi-network-test
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 10s
      retries: 30

# 网络配置
networks:
  ruoyi-network-test:
    name: ruoyi-network-test
    driver: bridge